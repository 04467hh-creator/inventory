<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瑞奇活力館 - 盤點系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; }
        #reader { width: 100%; border: none !important; }
        #reader__scan_region { background: #000; }
        #reader__status_span { display: none !important; }
        .list-container { height: calc(100vh - 460px); overflow-y: auto; }
        .last-scan-popup { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-100">

    <div class="bg-black relative shadow-lg">
        <div id="reader"></div>
        
        <div id="hud" class="absolute bottom-0 left-0 right-0 bg-blue-600/90 backdrop-blur-md p-3 text-white hidden last-scan-popup">
            <div class="flex justify-between items-center max-w-md mx-auto">
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] opacity-80 uppercase tracking-widest">剛才掃描到：</p>
                    <h4 id="hud-name" class="font-bold truncate text-sm">商品名稱</h4>
                </div>
                <div class="pl-4 text-right">
                    <p class="text-[10px] opacity-80">累計</p>
                    <p class="text-xl font-black"><span id="hud-qty">1</span> 件</p>
                </div>
            </div>
        </div>
    </div>

    <div class="p-4">
        <div class="flex justify-between items-center mb-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <p class="text-xs text-slate-400 font-bold">總計數量 (Total)</p>
                <h2 id="total-qty" class="text-3xl font-black text-blue-600">0</h2>
            </div>
            <button onclick="exportToCSV()" class="bg-slate-800 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md active:scale-95 transition-all">匯出報表</button>
        </div>

        <div class="list-container">
            <div id="empty-state" class="text-center py-10 text-slate-400">
                <div class="text-4xl mb-2">📸</div>
                <p>等待感應...</p>
            </div>
            <div id="inventory-list" class="space-y-2"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 border-t flex gap-3">
        <button onclick="manualInput()" class="flex-1 py-3 bg-slate-200 text-slate-700 rounded-xl font-bold text-sm">手動輸入</button>
        <button onclick="clearInventory()" class="px-6 py-3 text-red-500 font-bold text-sm">清空重來</button>
    </div>

    <script>
        // 資料庫 (已整合您提供的檔案資訊)
        const PRODUCT_DB = {
            "2318301000017": "受託代銷-E200-19萊卡素泳帽",
            "2318501000015": "受託代銷-C02-07海灘球",
            "2318502500019": "受託代銷-小座船-雷",
            "2318502500026": "受託代銷-中座船-雷",
            "4713696905813": "受託代銷-A4015-M男童泳裝.雷",
            "4713696905820": "受託代銷-A4015-L男童泳裝.雷",
            "4713696905837": "受託代銷-A4015-XL男童泳裝.雷",
            "4713696905844": "受託代銷-A4015-EL男童泳裝.雷",
            "4713696905851": "受託代銷-A4016-M男童泳裝.雷",
            "4713696905868": "受託代銷-A4016-L男童泳裝.雷",
            "4713696905875": "受託代銷-A4016-XL男童泳裝.雷",
            "4713696905882": "受託代銷-A4016-EL男童泳裝.雷"
        };

        let inventory = {}; // 格式: { "條碼": { name: "名稱", qty: 數量 } }
        let isScanning = true;
        const html5QrCode = new Html5Qrcode("reader");

        function startCamera() {
            const config = { fps: 20, qrbox: { width: 280, height: 150 } };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
        }

        function onScanSuccess(decodedText) {
            if (!isScanning) return;
            isScanning = false; 

            handleItem(decodedText.trim());

            // 1.2 秒後恢復掃描，防止快速重複感應
            setTimeout(() => { isScanning = true; }, 1200);
        }

        function handleItem(code) {
            const name = PRODUCT_DB[code] || "未知商品 (新貨號)";
            
            // --- 自動累計邏輯 ---
            if (inventory[code]) {
                inventory[code].qty += 1;
            } else {
                inventory[code] = { name: name, qty: 1 };
            }

            // 即時顯示 HUD
            showHUD(name, inventory[code].qty);
            
            // 震動回饋
            if (navigator.vibrate) navigator.vibrate(80);

            render();
        }

        function showHUD(name, qty) {
            const hud = document.getElementById('hud');
            document.getElementById('hud-name').innerText = name;
            document.getElementById('hud-qty').innerText = qty;
            hud.classList.remove('hidden');
            
            // 3秒後自動隱藏提示
            clearTimeout(window.hudTimer);
            window.hudTimer = setTimeout(() => {
                hud.classList.add('hidden');
            }, 3000);
        }

        function render() {
            const listBody = document.getElementById('inventory-list');
            const emptyState = document.getElementById('empty-state');
            const totalDisplay = document.getElementById('total-qty');
            
            const keys = Object.keys(inventory);
            if (keys.length > 0) emptyState.style.display = 'none';

            listBody.innerHTML = '';
            let grandTotal = 0;

            // 將最新更新的商品放在清單最上面
            keys.reverse().forEach(code => {
                const item = inventory[code];
                grandTotal += item.qty;
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-blue-500 animate-in fade-in duration-300";
                div.innerHTML = `
                    <div class="flex-1 min-w-0 pr-4">
                        <p class="text-[10px] text-slate-400 font-mono">${code}</p>
                        <h3 class="font-bold text-slate-700 text-sm truncate">${item.name}</h3>
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-slate-400">累計</span>
                        <span class="text-xl font-black text-blue-600">${item.qty}</span>
                    </div>
                `;
                listBody.appendChild(div);
            });
            totalDisplay.innerText = grandTotal;
        }

        function manualInput() {
            const code = prompt("請輸入或貼上條碼：");
            if (code) handleItem(code.trim());
        }

        function clearInventory() {
            if (confirm("確定要刪除所有盤點紀錄嗎？")) {
                inventory = {};
                render();
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('hud').classList.add('hidden');
            }
        }

        function exportToCSV() {
            const keys = Object.keys(inventory);
            if (keys.length === 0) return alert("目前清單沒有資料可以匯出");
            let csv = "\ufeff條碼,品名,盤點件數\n";
            keys.forEach(k => {
                csv += `"${k}","${inventory[k].name}",${inventory[k].qty}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `瑞奇盤點表_${new Date().getMonth()+1}${new Date().getDate()}_${new Date().getHours()}${new Date().getMinutes()}.csv`;
            link.click();
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
